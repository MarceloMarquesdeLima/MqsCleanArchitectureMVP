apiVersion: apps/v1
kind: Deployment
metadata:
  name: banking-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: banking-api
  template:
    metadata:
      labels:
        app: banking-api
    spec:
      containers:
        - name: banking-api
          image: banking-api:latest
          ports:
            - containerPort: 80
          env:
            - name: SQL_CONNECTION
              value: "Server=sqlserver;Database=BankingDB;User Id=sa;Password=YourPassword123;"
            - name: MONGO_CONNECTION
              value: "mongodb://mongo:27017"
            - name: KAFKA_BOOTSTRAP
              value: "kafka:9092"
---
apiVersion: v1
kind: Service
metadata:
  name: banking-api-service
spec:
  selector:
    app: banking-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP
