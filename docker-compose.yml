version: '3.8'

services:
  api:
    build: ./src/API
    container_name: banking-api
    ports:
      - "5000:80"
    environment:
      - SQL_CONNECTION=Server=sqlserver;Database=BankingDB;User Id=sa;Password=YourPassword123;
      - MONGO_CONNECTION=mongodb://mongo:27017
      - KAFKA_BOOTSTRAP=kafka:9092
    depends_on:
      - sqlserver
      - mongo
      - kafka

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=YourPassword123
    volumes:
      - sql_data:/var/opt/mssql

  mongo:
    image: mongo:6.0
    container_name: mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  zookeeper:
    image: bitnami/zookeeper:latest
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      - ALLOW_ANONYMOUS_LOGIN=yes

  kafka:
    image: bitnami/kafka:latest
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_CFG_ZOOKEEPER_CONNECT=zookeeper:2181
      - ALLOW_PLAINTEXT_LISTENER=yes
    depends_on:
      - zookeeper

volumes:
  sql_data:
  mongo_data:
